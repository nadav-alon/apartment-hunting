            <div class="grid grid-cols-4 gap-1">

            <div class="mt-3 flex items-center justify-between gap-3">

            </div>

            <!-- Transit layer toggles -->
            <div class="mt-3 flex items-center gap-2">
                <span class="text-xs text-gray-500 font-medium ml-1">תחנות:</span>
                <button onclick="toggleLayer('rail')" id="btn-rail"

                    <i class="fa-solid fa-train" style="font-size:10px;"></i> רכבת
                </button>
                <button onclick="toggleLayer('tram')" id="btn-tram"
                        class="transit-btn text-[11px] font-medium py-1 px-2 rounded-lg flex items-center gap-1 bg-purple-700 text-white border border-purple-700 shadow-sm transition">

    function calculateDistance(coords1, coords2) {
        const [lat1, lon1] = coords1;
        const [lat2, lon2] = coords2;
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) ** 2 +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) ** 2;
        const roadKm = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)) * 1.4;
        return { km: roadKm.toFixed(1), mins: Math.round((roadKm / 25) * 60) };
    }

            iconSize: [size, size],
            iconAnchor: [size / 2, size / 2],
            popupAnchor: [0, -size / 2 - 4]
        });
    }

    const tramIcon       = makeIcon('#7c3aed', 'fa-solid fa-tram',      24, false);

        </div>`)

    // ── Apartment list + markers ──────────────────────────────────────────────

        apartmentLayer.clearLayers();

            .filter(a => (currentCityFilter === 'all' || a.city === currentCityFilter) && a.price <= currentMaxPrice)

        if (visible.length === 0) {
            listEl.innerHTML = `<div class="p-8 text-center text-gray-400">

                <p class="text-sm">לא נמצאו דירות התואמות את הסינון</p>

            return;

        const bounds = [WORKPLACE_COORDS];

        visible.forEach(apt => {
            const dist = calculateDistance(apt.coords, WORKPLACE_COORDS);
            bounds.push(apt.coords);

            const popup = `<div style="text-align:right;font-family:Rubik,sans-serif;max-width:240px;padding:4px;">
                <span style="display:inline-block;background:#e0e7ff;color:#3730a3;font-size:10px;font-weight:700;padding:1px 8px;border-radius:999px;margin-bottom:4px;">${apt.city} | ${apt.neighborhood}</span>
                <div style="font-weight:700;font-size:13px;margin-bottom:2px;">${apt.address}</div>
                <div style="font-size:11px;color:#6b7280;margin-bottom:2px;">${apt.details}</div>
                <div style="font-size:12px;font-weight:700;color:#4f46e5;margin-bottom:6px;">₪${apt.price.toLocaleString()}</div>
                <div style="border-top:1px solid #f3f4f6;padding-top:6px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:#9ca3af;">

                    <a href="${apt.link}" target="_blank" style="color:#4f46e5;font-weight:600;text-decoration:none;">Yad2 &rarr;</a>
                </div>
            </div>`;

            const marker = L.marker(apt.coords, { icon: apartmentIcon })
                .bindPopup(popup)
                .addTo(apartmentLayer);

            const card = document.createElement('div');
            card.className = 'p-4 hover:bg-indigo-50/50 cursor-pointer transition border-b border-gray-100 flex justify-between items-start gap-3 group';

                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-1.5 mb-1 flex-wrap">
                        <span class="bg-gray-100 text-gray-800 text-[10px] px-1.5 py-0.5 rounded-md font-medium">${apt.city}</span>
                        <span class="bg-indigo-50 text-indigo-700 text-[10px] px-1.5 py-0.5 rounded-md font-medium">${apt.neighborhood}</span>
                    </div>
                    <h3 class="font-bold text-sm text-gray-900 truncate group-hover:text-indigo-900">${apt.address}</h3>
                    <p class="text-xs text-gray-500 mt-0.5 truncate">${apt.details}</p>
                    <div class="mt-2 flex items-center gap-4 text-xs text-gray-500">
                        <span><i class="fa-solid fa-car text-red-400 ml-1"></i>~${dist.km} ק"מ (~${dist.mins} דק')</span>
                    </div>
                </div>
                <div class="flex flex-col justify-between items-end min-h-[70px]">
                    <span class="text-sm font-bold text-indigo-600 bg-indigo-50 border border-indigo-100 px-2 py-1 rounded-lg">₪${apt.price.toLocaleString()}</span>
                    <a href="${apt.link}" target="_blank" onclick="event.stopPropagation();"
                       class="text-[10px] text-gray-400 hover:text-indigo-600 transition flex items-center gap-1 mt-2">
                        Yad2 <i class="fa-solid fa-up-right-from-square text-[9px]"></i>
                    </a>
                </div>
            `;
            listEl.appendChild(card);

        if (bounds.length > 1) {
            map.fitBounds(L.latLngBounds(bounds), { padding: [50, 50], maxZoom: 15 });

    // ── Filters ──────────────────────────────────────────────────────────────
    const CITY_BTN = { 'all': 'btn-all', 'תל אביב יפו': 'btn-ta', 'רמת גן': 'btn-rg', 'גבעתיים': 'btn-gv' };

    function filterCity(city) {
        currentCityFilter = city;
        document.querySelectorAll('.filter-btn').forEach(b => b.className = BTN_IDLE);

    function updatePriceFilter(val) {
        currentMaxPrice = parseInt(val);
        document.getElementById('priceVal').innerText =
            currentMaxPrice >= SLIDER_MAX ? 'הכל' : `${currentMaxPrice.toLocaleString()} ₪`;
        buildApp();

    // ── Transit layer toggle ──────────────────────────────────────────────────
    function toggleLayer(type) {
        layerState[type] = !layerState[type];
        const layer = type === 'rail' ? railLayer : tramLayer;
        const btn   = document.getElementById(`btn-${type}`);
        const color = type === 'rail' ? '#15803d' : '#7c3aed';

        if (layerState[type]) {
            map.addLayer(layer);
            btn.style.background = color;
            btn.style.color = 'white';
            btn.style.borderColor = color;
        } else {
            map.removeLayer(layer);
            btn.style.background = 'white';
            btn.style.color = '#6b7280';
            btn.style.borderColor = '#e5e7eb';
        }
    }

    // ── Transit stations via Overpass ─────────────────────────────────────────
    async function loadTransitStations() {
        const statusEl = document.getElementById('transit-status');
        try {
            const query = `[out:json][timeout:25];
(
  node["railway"~"^(station|halt)$"](31.97,34.74,32.13,34.90);
  node["railway"="tram_stop"](31.97,34.74,32.13,34.90);
);
out body;`;

            const resp = await fetch('https://overpass-api.de/api/interpreter', {
                method: 'POST',
                body: 'data=' + encodeURIComponent(query)
            });
            const data = await resp.json();
            const nodes = data.elements || [];

            let railCount = 0, tramCount = 0;

            nodes.forEach(node => {
                const tags = node.tags || {};
                const name = tags.name || tags['name:he'] || '';
                if (!name) return;

                const isLightRail = tags.railway === 'tram_stop' ||
                                    tags.light_rail === 'yes' ||
                                    (tags.network || '').includes('Light Rail') ||
                                    (tags.network || '').includes('קלה');

                const coords = [node.lat, node.lon];

                if (isLightRail) {
                    const popup = `<div style="text-align:right;font-family:Rubik,sans-serif;padding:4px;">
                        <span style="display:inline-block;background:#ede9fe;color:#6d28d9;font-size:10px;font-weight:700;padding:1px 8px;border-radius:999px;margin-bottom:4px;">רכבת קלה</span><br>
                        <strong style="font-size:12px;">${name}</strong>
                    </div>`;
                    L.marker(coords, { icon: tramIcon }).bindPopup(popup).addTo(tramLayer);
                    tramCount++;
                } else {
                    const popup = `<div style="text-align:right;font-family:Rubik,sans-serif;padding:4px;">
                        <span style="display:inline-block;background:#dcfce7;color:#166534;font-size:10px;font-weight:700;padding:1px 8px;border-radius:999px;margin-bottom:4px;">רכבת ישראל</span><br>
                        <strong style="font-size:12px;">${name}</strong>
                    </div>`;
                    L.marker(coords, { icon: railIcon }).bindPopup(popup).addTo(railLayer);
                    railCount++;
                }
            });

            statusEl.innerText = `${railCount} רכבת, ${tramCount} קלה`;
        } catch (e) {
            statusEl.innerText = 'שגיאה בטעינה';
            console.error('Transit load failed:', e);
        }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    buildApp();
    loadTransitStations();
</script>
</body>
</html>
