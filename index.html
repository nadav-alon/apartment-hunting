<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת דירות להשכרה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap');
        body { font-family: 'Rubik', sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; }
        .workplace-pulse { border-radius: 50%; animation: pulse-ring 1.6s infinite; }
        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0   rgba(220,38,38,.55); }
            70%  { box-shadow: 0 0 0 12px rgba(220,38,38,0); }
            100% { box-shadow: 0 0 0 0   rgba(220,38,38,0); }
        }
    </style>
</head>
<body class="bg-gray-50 h-screen overflow-hidden flex flex-col md:flex-row">

<!-- ── Sidebar ────────────────────────────────────────────────────────────── -->
<div class="w-full md:w-96 bg-white shadow-xl flex flex-col z-10 h-1/2 md:h-full">

    <!-- Header -->
    <div class="p-4 bg-indigo-900 text-white flex-shrink-0">
        <div class="flex items-center justify-between">
            <h1 class="text-lg font-bold flex items-center gap-2">
                <i class="fa-solid fa-map-location-dot"></i> מפת הדירות שלי
            </h1>
            <div class="flex gap-1.5">
                <button onclick="openAddModal()" title="הוסף דירה חדשה"
                        class="w-8 h-8 rounded-lg bg-white/20 hover:bg-white/30 flex items-center justify-center transition">
                    <i class="fa-solid fa-plus text-sm"></i>
                </button>
                <button onclick="openImportModal()" title="ייבוא JSON"
                        class="w-8 h-8 rounded-lg bg-white/20 hover:bg-white/30 flex items-center justify-center transition">
                    <i class="fa-solid fa-file-import text-sm"></i>
                </button>
                <button onclick="exportData()" title="ייצוא JSON"
                        class="w-8 h-8 rounded-lg bg-white/20 hover:bg-white/30 flex items-center justify-center transition">
                    <i class="fa-solid fa-file-export text-sm"></i>
                </button>
            </div>
        </div>
        <p class="text-xs text-indigo-200 mt-0.5">חיפוש דירות והערכת מרחק למקום העבודה</p>
    </div>

    <!-- Workplace -->
    <div class="p-3 bg-red-50 border-b border-red-100 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center text-white flex-shrink-0">
                <i class="fa-solid fa-briefcase text-sm"></i>
            </div>
            <div>
                <div class="text-xs font-bold text-red-900">יעד הגעה: מגדל אלון 1</div>
                <div class="text-[10px] text-red-700">יגאל אלון 94, תל אביב</div>
            </div>
        </div>
        <span class="text-[10px] bg-red-200 text-red-800 font-bold px-2 py-0.5 rounded-full flex-shrink-0">עבודה</span>
    </div>

    <!-- Filters -->
    <div class="p-3 bg-gray-50 border-b border-gray-100 flex-shrink-0 space-y-2.5">
        <!-- Search -->
        <input id="search-input" type="text" placeholder="חיפוש לפי כתובת, שכונה, עיר..."
               oninput="updateSearch(this.value)"
               class="w-full border rounded-lg px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">

        <!-- City -->
        <div>
            <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">עיר</div>
            <div class="grid grid-cols-4 gap-1" id="city-filter-btns"></div>
        </div>

        <!-- Price -->
        <div class="flex items-center justify-between gap-3">
            <label for="maxPrice" class="text-xs text-gray-600 whitespace-nowrap">
                מחיר: <span id="priceVal" class="font-bold text-indigo-600"></span>
            </label>
            <input type="range" id="maxPrice" min="1000" step="100"
                   class="w-1/2 accent-indigo-600" oninput="updatePriceFilter(this.value)">
        </div>

        <!-- Status filter -->
        <div>
            <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1.5">סטטוס</div>
            <div class="flex gap-1 flex-wrap" id="status-filter-btns"></div>
        </div>

        <!-- Quick filters + sort -->
        <div class="flex items-center gap-2 flex-wrap">
            <button onclick="toggleVisitingToday()" id="btn-visiting-today"
                    class="text-[11px] font-medium py-1 px-2.5 rounded-lg border transition flex items-center gap-1 bg-white text-gray-600 border-gray-200 hover:bg-gray-100">
                <i class="fa-solid fa-calendar-day" style="font-size:10px;"></i> ביקור היום
            </button>
            <span class="text-gray-300">|</span>
            <span class="text-[10px] font-bold text-gray-400 uppercase">מיון:</span>
            <button onclick="setSort('price')"     id="sort-price" class="sort-btn text-[11px] py-0.5 px-2 rounded-lg border transition bg-indigo-600 text-white border-indigo-600">מחיר</button>
            <button onclick="setSort('distance')"  id="sort-dist"  class="sort-btn text-[11px] py-0.5 px-2 rounded-lg border transition bg-white text-gray-600 border-gray-200 hover:bg-gray-100">מרחק</button>
            <button onclick="setSort('entryDate')" id="sort-entry" class="sort-btn text-[11px] py-0.5 px-2 rounded-lg border transition bg-white text-gray-600 border-gray-200 hover:bg-gray-100">כניסה</button>
        </div>

        <!-- Transit -->
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">תחנות:</span>
            <button onclick="toggleLayer('rail')" id="btn-rail"
                    class="text-[11px] font-medium py-0.5 px-2 rounded-lg flex items-center gap-1 bg-green-700 text-white border border-green-700 transition">
                <i class="fa-solid fa-train" style="font-size:9px;"></i> רכבת
            </button>
            <button onclick="toggleLayer('tram')" id="btn-tram"
                    class="text-[11px] font-medium py-0.5 px-2 rounded-lg flex items-center gap-1 bg-purple-700 text-white border border-purple-700 transition">
                <i class="fa-solid fa-tram" style="font-size:9px;"></i> רכבת קלה
            </button>
            <span id="transit-status" class="text-[10px] text-gray-400">טוען...</span>
        </div>
    </div>

    <!-- List -->
    <div id="apartment-list" class="flex-1 overflow-y-auto divide-y divide-gray-100"></div>

    <!-- Footer -->
    <div class="p-2.5 bg-gray-50 border-t border-gray-100 text-center text-xs text-gray-500 flex-shrink-0">
        נמצאו <span id="listings-count" class="font-bold text-indigo-600">0</span> דירות
    </div>
</div>

<!-- ── Map ────────────────────────────────────────────────────────────────── -->
<div class="flex-1 h-1/2 md:h-full relative" dir="ltr">
    <div id="map"></div>
</div>

<!-- ── Add / Edit Apartment Modal ─────────────────────────────────────────── -->
<!-- ── Unified Edit / Notes Modal ─────────────────────────────────────────── -->
<div id="modal-main" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md max-h-[90vh] flex flex-col" dir="rtl">
    <!-- Header -->
    <div class="bg-indigo-900 text-white rounded-t-xl flex-shrink-0">
      <div class="flex items-center justify-between px-4 pt-3 pb-2">
        <h2 id="modal-main-title" class="font-bold text-sm truncate max-w-[240px]"></h2>
        <button onclick="closeMainModal()" class="text-indigo-200 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <!-- Tab bar (hidden in add mode) -->
      <div id="modal-tabs" class="flex">
        <button id="tab-edit-btn" onclick="switchTab('edit')" type="button"
                class="flex-1 py-2 text-sm font-medium border-b-2 transition"
                style="border-bottom-color:white;color:white;">
          <i class="fa-solid fa-pen ml-1" style="font-size:10px;"></i>עריכה
        </button>
        <button id="tab-notes-btn" onclick="switchTab('notes')" type="button"
                class="flex-1 py-2 text-sm font-medium border-b-2 transition"
                style="border-bottom-color:transparent;color:#a5b4fc;">
          <i class="fa-solid fa-note-sticky ml-1" style="font-size:10px;"></i>הערות
        </button>
      </div>
    </div>

    <!-- Edit tab -->
    <div id="tab-edit" class="overflow-y-auto flex-1">
      <form id="form-apt" onsubmit="submitAptForm(event)" class="p-4 space-y-2.5">
        <input id="f-id" type="hidden">

        <input id="f-address" type="text" placeholder="כתובת (רחוב ומספר) *" required
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">

        <div class="grid grid-cols-2 gap-2">
          <input id="f-city" type="text" placeholder="עיר *" required
                 class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <input id="f-neighborhood" type="text" placeholder="שכונה"
                 class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>

        <div class="grid grid-cols-2 gap-2">
          <input id="f-price" type="number" placeholder="מחיר ₪ *" required min="0"
                 class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <input id="f-details" type="text" placeholder="פרטים (חדרים, קומה...)"
                 class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>

        <div>
          <input id="f-entry-date-text" type="text" dir="ltr" placeholder="תאריך כניסה: 1.8 · 1.8.26 · ..."
                 oninput="onAptDateInput('f-entry-date-text','f-entry-date','f-entry-date-preview',this.value)"
                 class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <input type="hidden" id="f-entry-date">
          <div id="f-entry-date-preview" class="text-[11px] mt-1 min-h-[1rem]"></div>
        </div>

        <input id="f-link" type="url" placeholder="קישור Yad2"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">

        <input id="f-contact" type="text" placeholder="איש קשר / טלפון"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">

        <!-- Geocoding -->
        <div class="border border-dashed border-gray-200 rounded-lg p-3 space-y-2">
          <div class="flex items-center gap-2">
            <button type="button" onclick="geocodeFormAddress()"
                    class="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700 transition whitespace-nowrap">
              <i class="fa-solid fa-location-dot ml-1"></i>חפש מיקום
            </button>
            <span id="geocode-status" class="text-[11px] text-gray-500 min-w-0 break-words"></span>
          </div>
          <input id="f-coords-paste" type="text" placeholder='הדבק מ-Google Maps: "32.0680, 34.7874"' dir="ltr"
                 oninput="parsePastedCoords(this.value)"
                 class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <div class="grid grid-cols-2 gap-2">
            <input id="f-lat" type="number" step="any" placeholder="Latitude (32.xxx)" dir="ltr"
                   class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <input id="f-lon" type="number" step="any" placeholder="Longitude (34.xxx)" dir="ltr"
                   class="border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          </div>
        </div>

        <div class="flex gap-2 pt-1">
          <button type="submit"
                  class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700 transition text-sm">
            שמור
          </button>
          <button type="button" onclick="closeMainModal()"
                  class="px-4 bg-gray-100 text-gray-700 py-2 rounded-lg font-medium hover:bg-gray-200 transition text-sm">
            ביטול
          </button>
        </div>
      </form>
    </div>

    <!-- Notes tab -->
    <div id="tab-notes" class="hidden overflow-y-auto flex-1">
      <div class="p-4 space-y-4">
        <div>
          <div class="text-xs font-bold text-gray-500 mb-2">סטטוס</div>
          <div class="grid grid-cols-4 gap-1.5" id="status-buttons"></div>
        </div>
        <div>
          <div class="text-xs font-bold text-gray-500 mb-1.5">תאריך ביקור</div>
          <input type="text" id="visit-date-text" dir="ltr"
                 placeholder="5.6  ·  5.6.26  ·  היום  ·  מחר"
                 oninput="onVisitDateInput(this.value)"
                 class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <input type="hidden" id="visit-date">
          <div id="visit-date-preview" class="text-[11px] mt-1 min-h-[1rem]"></div>
        </div>
        <div>
          <div class="text-xs font-bold text-gray-500 mb-1.5">הערות</div>
          <textarea id="notes-text" rows="4" placeholder="הערות, רשמים, שאלות..."
                    class="w-full border rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
        </div>
        <div class="flex gap-2">
          <button onclick="saveNotes()"
                  class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700 transition text-sm">שמור</button>
          <button type="button" onclick="closeMainModal()"
                  class="px-4 bg-gray-100 text-gray-700 py-2 rounded-lg font-medium hover:bg-gray-200 transition text-sm">סגור</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Import Modal ───────────────────────────────────────────────────────── -->
<div id="modal-import" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md" dir="rtl">
    <div class="p-4 bg-indigo-900 text-white rounded-t-xl flex items-center justify-between">
      <h2 class="font-bold">ייבוא רשימת דירות</h2>
      <button onclick="closeImportModal()" class="text-indigo-200 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>
    <div class="p-4 space-y-3">
      <p class="text-xs text-gray-500">הייבוא יחליף את הרשימה הקיימת. מומלץ לייצא קודם.</p>
      <div>
        <div class="text-xs font-bold text-gray-500 mb-1">העלה קובץ JSON</div>
        <input type="file" id="import-file" accept=".json"
               class="text-sm text-gray-600 w-full border rounded-lg px-3 py-2 cursor-pointer">
      </div>
      <div class="text-xs text-gray-400 text-center">— או —</div>
      <div>
        <div class="text-xs font-bold text-gray-500 mb-1">הדבק JSON</div>
        <textarea id="import-text" rows="5" placeholder='[{"address":"...", "city":"...", "price":5000, "coords":[32.07,34.80], ...}]'
                  class="w-full border rounded-lg px-3 py-2 text-sm font-mono resize-none focus:outline-none focus:ring-2 focus:ring-indigo-400" dir="ltr"></textarea>
      </div>
      <div id="import-error" class="text-xs text-red-600 hidden"></div>
      <div class="flex gap-2">
        <button onclick="doImport()"
                class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700 transition text-sm">ייבא</button>
        <button onclick="resetToDefaults()"
                class="px-3 bg-orange-100 text-orange-700 py-2 rounded-lg font-medium hover:bg-orange-200 transition text-sm">אפס לברירת מחדל</button>
        <button onclick="closeImportModal()"
                class="px-3 bg-gray-100 text-gray-700 py-2 rounded-lg font-medium hover:bg-gray-200 transition text-sm">ביטול</button>
      </div>
    </div>
  </div>
</div>

// ── LocalStorage ──────────────────────────────────────────────────────────
function loadApartments() {
    try {
        const raw = localStorage.getItem(DATA_KEY);
        if (raw) return JSON.parse(raw);
    } catch {}
    return initDefaults();
}

function initDefaults() {
    const today = new Date().toISOString().slice(0, 10);
    const data = DEFAULT_APARTMENTS.map(a => ({ ...a, status: 'interested', notes: '', dateAdded: today }));
    saveApartments(data);
    return data;
}

function saveApartments(data) {
    localStorage.setItem(DATA_KEY, JSON.stringify(data));
}

function exportData() {
    const data = loadApartments();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(blob),
        download: `apartments-${new Date().toISOString().slice(0,10)}.json`
    });
    a.click();
    URL.revokeObjectURL(a.href);
}

// ── Distance ──────────────────────────────────────────────────────────────
function calcDist(c1, c2) {
    const R = 6371, toRad = d => d * Math.PI / 180;
    const dLat = toRad(c2[0]-c1[0]), dLon = toRad(c2[1]-c1[1]);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(c1[0]))*Math.cos(toRad(c2[0]))*Math.sin(dLon/2)**2;
    const road = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 1.4;
    return { km: road.toFixed(1), mins: Math.round(road/25*60) };
}

function renderStatusFilterButtons() {
    const container = document.getElementById('status-filter-btns');
    container.innerHTML = '';
    STATUSES.forEach(s => {
        const included = selectedStatuses.has(s.value);
        const excluded = excludedStatuses.has(s.value);
        const btn = document.createElement('button');
        btn.title = included ? 'לחץ להחרגה' : excluded ? 'לחץ לניטרול' : 'לחץ לסינון';
        btn.className = 'text-[11px] font-medium py-0.5 px-2 rounded-lg border transition flex items-center gap-1';
        Object.assign(btn.style, included
            ? { background: s.bg,      color: 'white',    borderColor: s.bg }
            : excluded
            ? { background: '#fee2e2', color: '#dc2626',  borderColor: '#dc2626' }
            : { background: 'white',   color: '#4b5563',  borderColor: '#e5e7eb' });
        btn.innerHTML = excluded
            ? `<i class="fa-solid fa-ban" style="font-size:9px;"></i><s>${s.label}</s>`
            : `<i class="fa-solid ${s.icon}" style="font-size:9px;"></i>${s.label}`;
        btn.onclick = () => {
            if (excluded)      { excludedStatuses.delete(s.value); }            // excluded  → neutral
            else if (included) { selectedStatuses.delete(s.value); excludedStatuses.add(s.value); } // included → excluded
            else               { selectedStatuses.add(s.value); }               // neutral   → included
            renderStatusFilterButtons();
            buildApp(false);
        };
        container.appendChild(btn);
    });
}

const KNOWN_CITIES = ['תל אביב יפו', 'רמת גן', 'גבעתיים'];

function rebuildCityFilter(apts) {
    const extraCities = [...new Set(apts.map(a => a.city).filter(c => !KNOWN_CITIES.includes(c)))];
    const cities = ['all', ...KNOWN_CITIES, ...extraCities];
    const labels = { all: 'הכל', 'תל אביב יפו': 'תל אביב', 'רמת גן': 'רמת גן', 'גבעתיים': 'גבעתיים' };

    const container = document.getElementById('city-filter-btns');
    container.innerHTML = '';
    container.style.gridTemplateColumns = `repeat(${Math.min(cities.length, 4)}, 1fr)`;

    cities.forEach(city => {
        const btn = document.createElement('button');
        const isActive = currentCityFilter === city;
        btn.className = `text-[11px] font-medium py-1.5 rounded-lg text-center border transition ${
            isActive ? 'bg-indigo-600 text-white border-indigo-600 shadow-sm' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-100'
        }`;
        btn.textContent = labels[city] || city;
        btn.onclick = () => filterCity(city);
        container.appendChild(btn);
    });
}

function filterCity(city) {
    currentCityFilter = city;
    buildApp(false);
}

// ── Price filter ──────────────────────────────────────────────────────────
let currentMaxPrice = Infinity;

function updatePriceFilter(val) {
    const slider = document.getElementById('maxPrice');
    currentMaxPrice = parseInt(val);
    const isMax = currentMaxPrice >= parseInt(slider.max);
    document.getElementById('priceVal').innerText = isMax ? 'הכל' : `${currentMaxPrice.toLocaleString()} ₪`;
    if (isMax) currentMaxPrice = Infinity;
    buildApp(false);
}

function syncSlider(apts) {
    const slider = document.getElementById('maxPrice');
    const max = Math.max(...apts.map(a => a.price), 5000) + 500;
    slider.max = max;
    if (currentMaxPrice === Infinity || currentMaxPrice > max) {
        slider.value = max;
        currentMaxPrice = Infinity;
        document.getElementById('priceVal').innerText = 'הכל';
    }
}

// ── Build app ─────────────────────────────────────────────────────────────
function buildApp(fitMap = true) {
    const apts = loadApartments();
    syncSlider(apts);
    rebuildCityFilter(apts);
    renderStatusFilterButtons();
    apartmentLayer.clearLayers();

    const listEl = document.getElementById('apartment-list');
    listEl.innerHTML = '';
    const todayStr = today();

    const visible = apts.filter(a => {
        if (currentCityFilter !== 'all' && a.city !== currentCityFilter) return false;
        if (currentMaxPrice !== Infinity && a.price > currentMaxPrice) return false;
        if (selectedStatuses.size > 0 && !selectedStatuses.has(a.status)) return false;
        if (excludedStatuses.has(a.status)) return false;
        if (visitingTodayOnly && a.visitDate !== todayStr) return false;
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            if (![a.address, a.neighborhood, a.city, a.details, a.contact, a.notes]
                    .some(f => f && f.toLowerCase().includes(q))) return false;
        }
        return true;
    }).sort((a, b) => {
        if (currentSort === 'distance') {
            return calcDist(a.coords, WORKPLACE_COORDS).km - calcDist(b.coords, WORKPLACE_COORDS).km;
        }
        if (currentSort === 'entryDate') {
            if (!a.entryDate && !b.entryDate) return 0;
            if (!a.entryDate) return 1;
            if (!b.entryDate) return -1;
            return a.entryDate.localeCompare(b.entryDate);
        }
        return a.price - b.price;
    });

    document.getElementById('listings-count').innerText = visible.length;

// ── Transit layer ─────────────────────────────────────────────────────────
function toggleLayer(type) {
    layerState[type] = !layerState[type];
    const layer = type === 'rail' ? railLayer : tramLayer;
    const btn   = document.getElementById(`btn-${type}`);
    const color = type === 'rail' ? '#15803d' : '#7c3aed';
    if (layerState[type]) {
        map.addLayer(layer);
        Object.assign(btn.style, { background: color, color: 'white', borderColor: color });
    } else {
        map.removeLayer(layer);
        Object.assign(btn.style, { background: 'white', color: '#6b7280', borderColor: '#e5e7eb' });
    }
}

async function loadTransitStations() {
    try {
        const query = `[out:json][timeout:25];
(node["railway"~"^(station|halt)$"](31.97,34.74,32.13,34.90);
 node["railway"="tram_stop"](31.97,34.74,32.13,34.90););out body;`;
        const resp = await fetch('https://overpass-api.de/api/interpreter', {
            method: 'POST', body: 'data=' + encodeURIComponent(query)
        });
        const { elements = [] } = await resp.json();
        let r = 0, t = 0;
        elements.forEach(({ tags = {}, lat, lon }) => {
            const name = tags.name || tags['name:he'] || '';
            if (!name) return;
            const isLight = tags.railway === 'tram_stop' || tags.light_rail === 'yes'
                         || (tags.network||'').includes('Light Rail') || (tags.network||'').includes('קלה');
            const popup = `<div style="text-align:right;font-family:Rubik,sans-serif;padding:4px;">
                <span style="display:inline-block;font-size:10px;font-weight:700;padding:1px 8px;border-radius:999px;margin-bottom:2px;
                      background:${isLight?'#ede9fe':'#dcfce7'};color:${isLight?'#6d28d9':'#166534'};">
                      ${isLight ? 'רכבת קלה' : 'רכבת ישראל'}</span><br>
                <strong style="font-size:12px;">${name}</strong></div>`;
            if (isLight) { L.marker([lat,lon],{icon:tramIcon}).bindPopup(popup).addTo(tramLayer); t++; }
            else         { L.marker([lat,lon],{icon:railIcon}).bindPopup(popup).addTo(railLayer); r++; }
        });
        document.getElementById('transit-status').innerText = `${r} רכבת, ${t} קלה`;
    } catch {
        document.getElementById('transit-status').innerText = 'שגיאה';
    }
}

let currentEditId = null;

function switchTab(tab) {
    const isEdit = tab === 'edit';
    document.getElementById('tab-edit').classList.toggle('hidden', !isEdit);
    document.getElementById('tab-notes').classList.toggle('hidden', isEdit);
    Object.assign(document.getElementById('tab-edit-btn').style,
        isEdit  ? { borderBottomColor: 'white', color: 'white' }

    Object.assign(document.getElementById('tab-notes-btn').style,
        !isEdit ? { borderBottomColor: 'white', color: 'white' }
                : { borderBottomColor: 'transparent', color: '#a5b4fc' });
    if (!isEdit && currentEditId !== null) {
        const apt = loadApartments().find(a => a.id === currentEditId);
        if (apt) _populateNotesTab(apt);
    }
}

function _populateEditForm(apt) {
    document.getElementById('f-id').value            = apt.id;
    document.getElementById('f-address').value       = apt.address;
    document.getElementById('f-city').value          = apt.city;
    document.getElementById('f-neighborhood').value  = apt.neighborhood || '';
    document.getElementById('f-price').value         = apt.price;
    document.getElementById('f-details').value       = apt.details || '';
    document.getElementById('f-link').value          = apt.link || '';
    document.getElementById('f-contact').value       = apt.contact || '';
    document.getElementById('f-lat').value           = apt.coords[0];
    document.getElementById('f-lon').value           = apt.coords[1];
    document.getElementById('f-coords-paste').value  = '';

    document.getElementById('f-entry-date-text').value = entryTextVal;
    onAptDateInput('f-entry-date-text', 'f-entry-date', 'f-entry-date-preview', entryTextVal);

// keep old names as aliases so any stray references still work
const closeAptModal   = closeMainModal;

async function geocodeFormAddress() {
    const address = document.getElementById('f-address').value.trim();
    const city    = document.getElementById('f-city').value.trim();
    if (!address) { setGeocodeStatus('הזן כתובת קודם', '#ef4444'); return; }
    setGeocodeStatus('מחפש...', '#6b7280');
    try {
        const q = encodeURIComponent(`${address}${city ? ', '+city : ''}, ישראל`);
        const data = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=il`,
            { headers: { 'User-Agent': 'apartment-hunter-poc/1.0' } }
        ).then(r => r.json());
        if (data.length) {
            document.getElementById('f-lat').value = parseFloat(data[0].lat).toFixed(6);
            document.getElementById('f-lon').value = parseFloat(data[0].lon).toFixed(6);
            setGeocodeStatus(`✓ ${data[0].display_name.slice(0,55)}`, '#059669');
        } else {
            setGeocodeStatus('לא נמצא — הזן קואורדינטות ידנית', '#ef4444');
        }
    } catch { setGeocodeStatus('שגיאה בחיפוש', '#ef4444'); }
}

// Accepts "32.068, 34.787", "32.068 34.787", or a Google Maps share URL containing @lat,lon
function parsePastedCoords(raw) {
    const s = raw.trim();
    if (!s) return;

    // Google Maps URL: contains @lat,lon,zoom
    const urlMatch = s.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
    if (urlMatch) {
        document.getElementById('f-lat').value = urlMatch[1];
        document.getElementById('f-lon').value = urlMatch[2];
        setGeocodeStatus('✓ נלקח מקישור Google Maps', '#059669');
        return;
    }

    // "lat, lon" or "lat lon" — two numbers separated by comma/space
    const parts = s.split(/[\s,]+/).map(Number).filter(n => !isNaN(n));
    if (parts.length >= 2) {
        // Swap if user accidentally pasted lon,lat (lon for Israel is ~34.x, lat is ~32.x)
        let [a, b] = parts;
        if (Math.abs(a) > Math.abs(b)) [a, b] = [b, a]; // smaller = lat for Israel
        document.getElementById('f-lat').value = a;
        document.getElementById('f-lon').value = b;
        setGeocodeStatus('✓ קואורדינטות הודבקו', '#059669');
    }
}

function setGeocodeStatus(msg, color) {
    const el = document.getElementById('geocode-status');
    el.textContent = msg;
    el.style.color = color;
}

function submitAptForm(e) {
    e.preventDefault();
    const lat = parseFloat(document.getElementById('f-lat').value);
    const lon = parseFloat(document.getElementById('f-lon').value);
    if (isNaN(lat) || isNaN(lon)) {
        setGeocodeStatus('נדרש מיקום — לחץ "חפש מיקום" או הזן קואורדינטות', '#ef4444');
        return;
    }
    const editId = document.getElementById('f-id').value;
    const apts   = loadApartments();
    const today  = new Date().toISOString().slice(0, 10);

    const base = editId ? (apts.find(a => a.id === parseInt(editId)) || {}) : {};
    const apt = {
        id:           editId ? parseInt(editId) : Date.now(),
        address:      document.getElementById('f-address').value.trim(),
        city:         document.getElementById('f-city').value.trim(),
        neighborhood: document.getElementById('f-neighborhood').value.trim(),
        price:        parseInt(document.getElementById('f-price').value),
        details:      document.getElementById('f-details').value.trim(),
        link:         document.getElementById('f-link').value.trim(),
        contact:      document.getElementById('f-contact').value.trim(),
        coords:       [lat, lon],
        status:       base.status    || 'interested',
        notes:        base.notes     || '',
        dateAdded:    base.dateAdded || today,
        entryDate:    document.getElementById('f-entry-date').value || null,
    };

    if (editId) {
        const idx = apts.findIndex(a => a.id === parseInt(editId));
        apts[idx] = apt;
    } else {
        apts.push(apt);
    }
    saveApartments(apts);
    closeMainModal();
    buildApp();
}

function deleteApartment(id) {
    const apt = loadApartments().find(a => a.id === id);
    if (!apt) return;
    if (!confirm(`למחוק את "${apt.address}"?`)) return;
    saveApartments(loadApartments().filter(a => a.id !== id));
    buildApp(false);
}

// ── Visit date parsing ────────────────────────────────────────────────────
function parseFlexDate(raw) {
    const s = raw.trim().toLowerCase();
    if (!s) return null;
    const yr = new Date().getFullYear();

    if (s === 'היום' || s === 'today')     return today();
    if (s === 'מחר'  || s === 'tomorrow') {
        const d = new Date(); d.setDate(d.getDate() + 1);
        return d.toISOString().slice(0, 10);
    }

    // split on . / - (space too, for "5 6")
    const parts = s.split(/[\.\-\/\s]+/).map(Number);
    if (parts.length < 2 || parts.some(isNaN)) return null;

    let [day, month, year] = parts;
    // if user typed ISO-ish: year first (> 1000)
    if (day > 1000) [day, month, year] = [month, year || month, day];
    year = year == null ? yr : year < 100 ? 2000 + year : year;

    if (month < 1 || month > 12 || day < 1 || day > 31) return null;
    const iso = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    // sanity-check the date is real
    const d = new Date(iso + 'T12:00:00');
    if (isNaN(d)) return null;
    return iso;
}

function onVisitDateInput(val) {
    onAptDateInput('visit-date-text', 'visit-date', 'visit-date-preview', val);
}

// ── Notes / Status modal ──────────────────────────────────────────────────
let pendingStatus = null;

function openNotesModal(id) {
    const apt = loadApartments().find(a => a.id === id);
    if (!apt) return;
    currentEditId = id;
    document.getElementById('modal-main-title').textContent = apt.address;
    document.getElementById('modal-tabs').style.display = '';
    _populateEditForm(apt);
    _populateNotesTab(apt);
    switchTab('notes');
    document.getElementById('modal-main').classList.remove('hidden');
}

function renderStatusButtons(active) {
    const container = document.getElementById('status-buttons');
    container.innerHTML = '';
    STATUSES.forEach(s => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.dataset.status = s.value;
        const isActive = active === s.value;
        Object.assign(btn.style, {
            background: isActive ? s.bg : 'white',
            color: isActive ? 'white' : '#374151',
            borderColor: isActive ? s.bg : '#e5e7eb',
        });
        btn.className = 'py-1.5 px-1 rounded-lg text-[11px] font-medium text-center border-2 transition flex flex-col items-center gap-0.5';
        btn.innerHTML = `<i class="fa-solid ${s.icon}" style="font-size:10px;"></i>${s.label}`;
        btn.onclick = () => {
            pendingStatus = s.value;
            renderStatusButtons(s.value);
        };
        container.appendChild(btn);
    });
}

function saveNotes() {
    const apts = loadApartments();
    const idx  = apts.findIndex(a => a.id === currentEditId);
    if (idx === -1) return;
    apts[idx].notes     = document.getElementById('notes-text').value.trim();
    apts[idx].status    = pendingStatus || apts[idx].status;
    apts[idx].visitDate = document.getElementById('visit-date').value || null;
    saveApartments(apts);
    closeMainModal();
    buildApp(false);
}

// ── Import modal ──────────────────────────────────────────────────────────
function openImportModal() {
    document.getElementById('import-file').value  = '';
    document.getElementById('import-text').value  = '';
    document.getElementById('import-error').classList.add('hidden');
    document.getElementById('modal-import').classList.remove('hidden');
}

function closeImportModal() { document.getElementById('modal-import').classList.add('hidden'); }

async function doImport() {
    const errEl = document.getElementById('import-error');
    errEl.classList.add('hidden');

    let raw = document.getElementById('import-text').value.trim();

    const file = document.getElementById('import-file').files[0];
    if (file) raw = await file.text();

    if (!raw) { showImportError('בחר קובץ או הדבק JSON'); return; }

    let data;
    try { data = JSON.parse(raw); } catch { showImportError('JSON לא תקין'); return; }
    if (!Array.isArray(data) || !data.length) { showImportError('Expected a non-empty JSON array'); return; }
    for (let i = 0; i < data.length; i++) {
        const a = data[i];
        if (!a.address || !a.city || typeof a.price !== 'number' || !Array.isArray(a.coords)) {
            showImportError(`שגיאה בפריט ${i+1}: חסרים שדות (address, city, price, coords)`); return;
        }
        // Fill optional status/notes for imported entries that lack them
        if (!a.status) a.status = 'interested';
        if (!a.notes)  a.notes  = '';
        if (!a.id)     a.id     = Date.now() + i;
    }
    saveApartments(data);
    closeImportModal();
    buildApp();
}

function showImportError(msg) {
    const el = document.getElementById('import-error');
    el.textContent = msg;
    el.classList.remove('hidden');
}

function resetToDefaults() {
    if (!confirm('לאפס את כל הרשימה לברירת המחדל? כל השינויים יאבדו.')) return;
    initDefaults();
    closeImportModal();
    buildApp();
}

buildApp();
loadTransitStations();
